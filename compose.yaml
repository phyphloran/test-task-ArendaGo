services:
  postgres:
    image: postgres:16-alpine
    container_name: task-catalog-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-task_catalog}
      POSTGRES_USER: ${DB_USERNAME:-task_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-task_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-task_user} -d ${DB_NAME:-task_catalog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-catalog-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/task_catalog}
      DB_USERNAME: ${DB_USERNAME:-task_user}
      DB_PASSWORD: ${DB_PASSWORD:-task_password}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: on-failure

volumes:
  postgres_data:
